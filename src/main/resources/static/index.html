<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目工时管理系统</title>
<link rel="stylesheet" href="css/design.css">
<style>
.page { display: none; }
.page.active { display: block; }
.menu-section { font-size: 11px; color: var(--color-text-muted); padding: 16px 24px 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-muted); }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--color-text); }
.perm-group { margin-bottom: 4px; padding: 8px 12px; border-radius: 8px; background: var(--color-canvas-secondary); }
.perm-menu-label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--color-text); cursor: pointer; padding: 4px 0; }
.perm-menu-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--color-primary); cursor: pointer; }
.perm-children { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; margin-left: 24px; }
.perm-child-label { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-muted); cursor: pointer; padding: 4px 10px; border-radius: 6px; background: var(--color-canvas); transition: background 0.15s; }
.perm-child-label:hover { background: #e8e8ed; }
.perm-child-label input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--color-primary); cursor: pointer; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <span style="display:inline-flex;align-items:center;gap:10px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.8"/>
        <path d="M12 6V12L15 15" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 19L9 17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M17 19L15 17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      项目工时管理系统
    </span>
  </div>
  <div class="navbar-right" style="position:relative">
    <span class="navbar-user" onclick="var d=document.getElementById('userDropdown');d.style.display=d.style.display==='none'?'block':'none';event.stopPropagation()">系统管理员 &#9660;</span>
    <div id="userDropdown" style="display:none;position:absolute;top:52px;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:6px 0;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:999">
      <div style="padding:10px 18px;font-size:14px;cursor:pointer;color:#1d1d1f;transition:background 0.15s" onmouseover="this.style.background='#f5f5f7'" onmouseout="this.style.background=''" onclick="showPasswordModal();event.stopPropagation()">修改密码</div>
      <div style="padding:10px 18px;font-size:14px;cursor:pointer;color:#ff453a;transition:background 0.15s;border-top:1px solid #f0f0f0" onmouseover="this.style.background='#f5f5f7'" onmouseout="this.style.background=''" onclick="window.location.href='login.html';event.stopPropagation()">退出系统</div>
    </div>
  </div>
  <script>
  document.addEventListener('click',function(e){
    var d=document.getElementById('userDropdown');
    if(d&&!e.target.closest('.navbar-right'))d.style.display='none';
  });
  </script>
</nav>

<div class="layout" style="padding-top:48px">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="mainContent"></main>
</div>

<script>
// ========== API ==========
function apiGet(url){return fetch(url,{credentials:'include'}).then(function(r){return r.json()}).then(function(d){return d.code===200?d.data:null})}
function apiPost(url,body){return fetch(url,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()})}
function apiPut(url,body){return fetch(url,{method:'PUT',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()})}
function apiDel(url){return fetch(url,{method:'DELETE',credentials:'include'}).then(function(r){return r.json()})}

// ========== Cache ==========
var dataCache={};
var apiRoutes={
  dashboard:'/api/dashboard',project:'/api/projects',task:'/api/tasks',
  timeEntry:'/api/time-entries',approval:'/api/approvals',
  statisticsEmp:'/api/statistics/employees',statisticsProj:'/api/statistics/projects',
  userMgmt:'/api/users',roleMgmt:'/api/roles'
};
function loadRouteData(r){var u=apiRoutes[r];if(!u)return Promise.resolve();return apiGet(u).then(function(d){if(d){var a=Array.isArray(d)?d:(d.list||[]);dataCache[r]=a}}).catch(function(){})}
function loadAllData(){return Promise.all([
  loadRouteData('dashboard'),loadRouteData('project'),loadRouteData('task'),
  loadRouteData('timeEntry'),loadRouteData('approval'),
  loadRouteData('statisticsEmp'),loadRouteData('statisticsProj'),
  loadRouteData('userMgmt'),loadRouteData('roleMgmt')
])}

// ========== Icons ==========
var icons={
  dashboard:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>',
  project:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V6a2 2 0 012-2h4l2 2h6a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2z"/></svg></span>',
  task:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 9l2 2 4-4"/><path d="M9 15l2 2 4-4"/></svg></span>',
  timeEntry:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></span>',
  approval:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></span>',
  statisticsEmp:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><path d="M15 3l4 4-4 4"/></svg></span>',
  statisticsProj:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></span>',
  userMgmt:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>',
  roleMgmt:'<span class="menu-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v4l3 3"/></svg></span>'
};

// ========== Routes ==========
var routes={
  dashboard:{label:'首页仪表盘',icon:icons.dashboard},
  project:{label:'项目管理',icon:icons.project},
  task:{label:'任务管理',icon:icons.task},
  timeEntry:{label:'工时管理',icon:icons.timeEntry},
  approval:{label:'工时审批',icon:icons.approval},
  statisticsEmp:{label:'员工工时统计',icon:icons.statisticsEmp},
  statisticsProj:{label:'项目工时统计',icon:icons.statisticsProj},
  userMgmt:{label:'用户管理',icon:icons.userMgmt},
  roleMgmt:{label:'角色管理',icon:icons.roleMgmt}
};

// ========== Permissions ==========
var rolePermissions={
  admin:{dashboard:['查看'],project:['查看','新建','编辑','删除'],task:['查看','新建','编辑','删除'],timeEntry:['查看','新建'],approval:['查看','审批通过','审批驳回'],statisticsEmp:['查看','导出Excel'],statisticsProj:['查看','导出Excel'],userMgmt:['查看','新建','编辑','删除'],roleMgmt:['查看','新建','编辑','删除','分配权限']},
  dept_manager:{dashboard:['查看'],project:['查看','新建','编辑'],task:['查看'],timeEntry:['查看'],approval:['查看','审批通过','审批驳回'],statisticsEmp:['查看','导出Excel'],statisticsProj:['查看','导出Excel'],userMgmt:[],roleMgmt:[]},
  project_manager:{dashboard:['查看'],project:['查看','新建','编辑','删除'],task:['查看','新建','编辑','删除'],timeEntry:['查看','新建'],approval:['查看','审批通过','审批驳回'],statisticsEmp:['查看'],statisticsProj:['查看'],userMgmt:[],roleMgmt:[]},
  employee:{dashboard:['查看'],project:[],task:[],timeEntry:['查看','新建'],approval:[],statisticsEmp:['查看'],statisticsProj:['查看'],userMgmt:[],roleMgmt:[]}
};
var currentRole='admin';
var currentRoute='dashboard';

// ========== Utils ==========

// ========== Filter Functions ==========
function filter_project(d){var n=(document.getElementById('f_projName')||{}).value||'',c=(document.getElementById('f_projCode')||{}).value||'',s=(document.getElementById('f_projStatus')||{}).value||'';return d.filter(function(p){return(!n||(p.name||'').indexOf(n)>=0)&&(!c||(p.code||'').indexOf(c)>=0)&&(!s||String(p.status)===s)})}
function filter_task(d){var n=(document.getElementById('f_taskName')||{}).value||'',p=(document.getElementById('f_taskProj')||{}).value||'',s=(document.getElementById('f_taskStatus')||{}).value||'';return d.filter(function(t){return(!n||(t.name||'').indexOf(n)>=0)&&(!p||String(t.projectId)===p||(t.projectName||'').indexOf(p)>=0)&&(!s||String(t.status)===s)})}
function filter_timeEntry(d){var u=(document.getElementById('f_teUser')||{}).value||'',pj=(document.getElementById('f_teProj')||{}).value||'',ds=(document.getElementById('f_teDateStart')||{}).value||'',de=(document.getElementById('f_teDateEnd')||{}).value||'',s=(document.getElementById('f_teStatus')||{}).value||'';return d.filter(function(e){return(!u||(e.user_name||'').indexOf(u)>=0)&&(!pj||String(e.projectId)===pj)&&(!ds||(e.work_date||'')>=ds)&&(!de||(e.work_date||'')<=de)&&(!s||String(e.status)===s)})}
function filter_statisticsEmp(d){var n=(document.getElementById('f_statEmpName')||{}).value||'';return d.filter(function(e){return!n||(e.userName||'').indexOf(n)>=0})}
function filter_statisticsProj(d){var n=(document.getElementById('f_statProjName')||{}).value||'';return d.filter(function(p){return!n||(p.projectName||'').indexOf(n)>=0})}
function filter_userMgmt(d){var un=(document.getElementById('f_userUname')||{}).value||'',nm=(document.getElementById('f_userName')||{}).value||'',rl=(document.getElementById('f_userRole')||{}).value||'',s=(document.getElementById('f_userStatus')||{}).value||'';return d.filter(function(u){return(!un||(u.username||'').indexOf(un)>=0)&&(!nm||(u.name||'').indexOf(nm)>=0)&&(!rl||String(u.roleId)===rl)&&(!s||String(u.status)===s)})}
function filter_roleMgmt(d){var n=(document.getElementById('f_roleName')||{}).value||'',s=(document.getElementById('f_roleStatus')||{}).value||'';return d.filter(function(r){return(!n||(r.name||'').indexOf(n)>=0)&&(!s||String(r.status)===s)})}
function applyFilter(r){navigate(r)}
function clearFilter(r){document.querySelectorAll('[id^="f_"]').forEach(function(el){el.value=''});navigate(r)}

function q(s){return "'"+s+"'"}
function esc(s){return(s||'').replace(/'/g,"\'")}

var pageState={dashboard:1,project:1,task:1,timeEntry:1,approval:1,statisticsEmp:1,statisticsProj:1,userMgmt:1,roleMgmt:1};

function pagination(section,current,total){
  var h='<div class="pagination" data-section="'+section+'">';
  h+='<button class="page-btn'+(current===1?' disabled':'')+'" data-page="'+(current-1)+'">‹</button>';
  for(var i=1;i<=total;i++){h+='<button class="page-btn'+(i===current?' active':'')+'" data-page="'+i+'">'+i+'</button>'}
  h+='<button class="page-btn'+(current===total?' disabled':'')+'" data-page="'+(current+1)+'">›</button>';
  h+='<span class="page-info">共 '+total+' 页</span></div>';
  return h;
}


function switchPage(section,page){
  if(page<1)return;
  pageState[section]=page;
  navigate(currentRoute);
}


function renderSidebar(ar){
  var h='<ul class="sidebar-menu">';
  for(var k in routes){var r=routes[k];var p=rolePermissions[currentRole][k]||[];if(p.length===0)continue;h+='<li class="'+(ar===k?'active':'')+'" data-route="'+k+'">'+r.icon+' '+r.label+'</li>'}
  h+='</ul>';
  document.getElementById('sidebar').innerHTML=h;
}

// ========== Render Functions ==========
function renderDashboard(){
  var d=dataCache.dashboard||{},pc=d.projectCount||0,tc=d.taskCount||0,uc=d.userCount||0,th=d.totalHours||0,mh=d.monthHours||0;
  var es=dataCache.timeEntry||[];
  var pp=pageState.dashboard,ps=5,pt=Math.ceil(es.length/ps)||1;
  var r0=es.slice((pp-1)*ps,pp*ps).map(function(e){var st=e.status===0?'待审批':e.status===1?'已通过':'已驳回',sc=e.status===0?'pending':e.status===1?'approved':'rejected';return'<tr><td>'+(e.user_name||'')+'</td><td>'+(e.project_name||'')+'</td><td>'+(e.task_name||'')+'</td><td>'+(e.work_date||'')+'</td><td>'+(e.hours||0)+'h</td><td><span class="badge badge-'+sc+'">'+st+'</span></td></tr>'}).join('');
  if(!r0)r0='<tr><td colspan="6" style="text-align:center;color:#999">暂无工时记录</td></tr>';
  var sp=dataCache.statisticsProj||[],se=dataCache.statisticsEmp||[];
  var pm=sp.map(function(d,i){return'<tr><td>'+(i+1)+'</td><td>'+(d.projectName||'')+'</td><td>'+(d.monthHours||0).toFixed(0)+'h</td></tr>'}).join(''),pyt=sp.map(function(d,i){return'<tr><td>'+(i+1)+'</td><td>'+(d.projectName||'')+'</td><td>'+(d.totalHours||0).toFixed(0)+'h</td></tr>'}).join('');
  var em=se.map(function(d,i){return'<tr><td>'+(i+1)+'</td><td>'+(d.userName||'')+'</td><td>'+(d.monthHours||0).toFixed(0)+'h</td></tr>'}).join(''),et=se.map(function(d,i){return'<tr><td>'+(i+1)+'</td><td>'+(d.userName||'')+'</td><td>'+(d.totalHours||0).toFixed(0)+'h</td></tr>'}).join('');
  var empty='<tr><td colspan="3" style="text-align:center;color:#999">暂无数据</td></tr>';
  return '<div style="margin-bottom:24px"><h1 style="font-size:22px;letter-spacing:-0.02em">首页仪表盘</h1></div>'+
    '<div class="stat-grid"><div class="stat-card"><div class="stat-value">'+pc+'</div><div class="stat-label">项目总数</div></div><div class="stat-card"><div class="stat-value">'+tc+'</div><div class="stat-label">任务总数</div></div><div class="stat-card"><div class="stat-value">'+uc+'</div><div class="stat-label">成员总数</div></div><div class="stat-card"><div class="stat-value">'+mh.toFixed(0)+'h</div><div class="stat-label">本月工时</div></div><div class="stat-card"><div class="stat-value" style="color:var(--color-primary)">'+th.toFixed(0)+'h</div><div class="stat-label">累计工时</div></div></div>'+
    '<div class="card" style="margin-top:24px"><div class="card-title">近期工时动态</div><div class="table-wrapper"><table><thead><tr><th>员工</th><th>项目</th><th>任务</th><th>日期</th><th>时长</th><th>状态</th></tr></thead><tbody>' + r0 + '</tbody></table></div></div>' + pagination('dashboard',pp,pt) +
    '<div class="rank-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px">'+
    '<div class="card"><div class="card-title">项目工时排名 TOP5（月度）</div><div class="table-wrapper"><table><thead><tr><th style="width:36px">#</th><th>项目名称</th><th style="width:80px">工时</th></tr></thead><tbody>'+(pm||empty)+'</tbody></table></div></div>'+
    '<div class="card"><div class="card-title">项目工时排名 TOP5（年度）</div><div class="table-wrapper"><table><thead><tr><th style="width:36px">#</th><th>项目名称</th><th style="width:80px">工时</th></tr></thead><tbody>'+(pyt||empty)+'</tbody></table></div></div>'+
    '<div class="card"><div class="card-title">员工工时排名 TOP5（月度）</div><div class="table-wrapper"><table><thead><tr><th style="width:36px">#</th><th>姓名</th><th style="width:80px">工时</th></tr></thead><tbody>'+(em||empty)+'</tbody></table></div></div>'+
    '<div class="card"><div class="card-title">员工工时排名 TOP5（年度）</div><div class="table-wrapper"><table><thead><tr><th style="width:36px">#</th><th>姓名</th><th style="width:80px">工时</th></tr></thead><tbody>'+(et||empty)+'</tbody></table></div></div></div>';
}



function renderProject(){
var d=filter_project(dataCache.project||[]);
  var r=d.length?d.map(function(p){
    var st=p.status===1?'启用':'停用',sc=p.status===1?'approved':'rejected';
    var mc=p.memberCount||(p.members?p.members.length:0);
    return '<tr><td>'+(p.name||'')+'</td><td>'+(p.code||'')+'</td><td>'+(p.dept||'')+'</td><td>'+mc+'</td><td><span class="badge badge-'+sc+'">'+st+'</span></td><td>'+(p.startDate||'')+'</td><td>'+(p.endDate||'')+'</td><td>'+
      '<button class="btn btn-sm btn-secondary" onclick="editProject('+p.id+')">编辑</button> '+
      '<button class="btn btn-sm btn-primary" onclick="manageMembers('+p.id+','+q(p.name||'')+')">成员管理</button> '+
      '<button class="btn btn-sm btn-danger" onclick="delProject('+p.id+')">删除</button></td></tr>'
  }).join(''):'<tr><td colspan="8" style="text-align:center;color:#999">暂无项目</td></tr>';
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><h1 style="font-size:22px">项目管理</h1><button class="btn btn-primary" onclick="newProject()">+ 新建项目</button></div>'+
    '<div class=\'filter-bar\' style=\'margin-bottom:16px\'><span style=\'font-size:13px;color:#6e6e73;margin-right:4px\'>项目名称</span><input type=\'text\' class=\'form-input\' id=\'f_projName\' placeholder=\'搜索项目名称...\' style=\'width:130px\'><span style=\'font-size:13px;color:#6e6e73;margin-right:4px;margin-left:8px\'>项目编号</span><input type=\'text\' class=\'form-input\' id=\'f_projCode\' placeholder=\'搜索编号...\' style=\'width:120px\'><span style=\'font-size:13px;color:#6e6e73;margin-right:4px;margin-left:8px\'>状态</span><select class=\'form-input form-select\' id=\'f_projStatus\' style=\'width:80px\'><option value=\'\'>全部</option><option value=\'1\'>启用</option><option value=\'0\'>停用</option></select><button class=\'btn btn-secondary btn-sm\' onclick=\'applyFilter(\"project\")\' style=\'margin-left:8px\'>查询</button><button class=\'btn btn-sm\' style=\'border:1px solid #d2d2d7;border-radius:9999px;color:#6e6e73;margin-left:4px\' onclick=\'clearFilter(\"project\")\' style=\'margin-left:4px\'>重置</button></div>' +
    '<div class="card"><div class="table-wrapper"><table><thead><tr><th>项目名称</th><th>项目编号</th><th>所属部门</th><th>成员数</th><th>状态</th><th>开始日期</th><th>结束日期</th><th>操作</th></tr></thead><tbody>'+r+'</tbody></table></div></div>' + pagination('project',pageState.project,Math.ceil((dataCache.project||[]).length/10)||1);
}



function renderTask(){
var d=filter_task(dataCache.task||[]);
  var r=d.length?d.map(function(t){
    var st=t.status===1?'启用':'停用';
    return '<tr><td>'+(t.name||'')+'</td><td>'+(t.code||'')+'</td><td>'+(t.projectName||'')+'</td><td>'+st+'</td><td>'+
      '<button class="btn btn-sm btn-secondary" onclick="editTask('+t.id+')">编辑</button> '+
      '<button class="btn btn-sm btn-danger" onclick="delTask('+t.id+')">删除</button></td></tr>'

    var sel2=document.getElementById('f_teProj');
    if(sel2&&sel2.options.length<=1&&dataCache.project)(dataCache.project||[]).forEach(function(p){var o=document.createElement('option');o.value=p.id;o.text=p.name;sel2.add(o)});
    var sel3=document.getElementById('f_userRole');
    if(sel3&&sel3.options.length<=1&&dataCache.roleMgmt)(dataCache.roleMgmt||[]).forEach(function(r){var o=document.createElement('option');o.value=r.id;o.text=r.name;sel3.add(o)});
  },100);

  // 填充查询下拉框
  var ps=document.getElementById('f_taskProj');
  if(ps&&ps.options.length<=1)(dataCache.project||[]).forEach(function(p){ps.add(new Option(p.name, p.id))});
  var pu=document.getElementById('f_teProj');
  if(pu&&pu.options.length<=1)(dataCache.project||[]).forEach(function(p){pu.add(new Option(p.name, p.id))});
  var pr=document.getElementById('f_userRole');
  if(pr&&pr.options.length<=1)(dataCache.roleMgmt||[]).forEach(function(r){pr.add(new Option(r.name, r.id))});

  currentRoute=route;
  renderSidebar(route);
  var fn=window['render'+route.charAt(0).toUpperCase()+route.slice(1)];
  if(fn)document.getElementById('mainContent').innerHTML=fn();
}

// ========== Modals ==========
function modal(title,bodyHtml){
  // 清理旧的弹窗，避免id冲突
  var old=document.querySelector('.modal-overlay');
  if(old)old.remove();
  var o=document.createElement('div');o.className='modal-overlay';
  o.onclick=function(e){if(e.target===o)o.remove()};
  o.innerHTML='<div class="modal" style="width:480px"><div class="modal-title">'+title+'</div>'+bodyHtml+'</div>';
  document.body.appendChild(o);return o;
}

function closeModal(o){if(o&&o.parentNode)o.remove()}

// ========== Toast ==========
function showToast(msg,type){
  var el=document.createElement('div');el.className='toast toast-'+(type||'success');el.textContent=msg;
  document.body.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},3000);
}

function showConfirm(msg,title,cb){
  var o=modal(title||'确认','<p style="font-size:14px;color:#555;margin:12px 0 24px">'+msg+'</p><div class="modal-footer"><button class="btn btn-secondary" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-danger" onclick="this.closest(\'.modal-overlay\').remove();('+cb+')()">确定</button></div>');
}

function delConfirm(msg,delFn){
  var o=modal('确认删除','<p style="font-size:14px;color:#555;margin:12px 0 24px">'+msg+'</p><div class="modal-footer"><button class="btn btn-secondary" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-danger" onclick="this.closest(\'.modal-overlay\').remove();'+delFn+'">确定删除</button></div>');
}

function loadTasksForEntry(){
  var pid=document.getElementById('teProject').value;

  apiGet('/api/tasks?projectId='+pid).then(function(tasks){
    var opts=(tasks||[]).map(function(t){return'<option value="'+t.id+'">'+esc(t.name)+'</option>'}).join('');
    document.getElementById('teTask').innerHTML='<option value="">请选择任务</option>'+opts;
  })
}
function saveTimeEntry(){
  var pid=document.getElementById('teProject').value,tid=document.getElementById('teTask').value,date=document.getElementById('teDate').value,hrs=document.getElementById('teHours').value;
  if(!pid){showToast('请选择项目','error');return}

  if(!hrs||parseFloat(hrs)<=0){showToast('请输入有效工时','error');return}
  apiPost('/api/time-entries',{projectId:parseInt(pid),taskId:parseInt(tid)||null,workDate:date,hours:parseFloat(hrs),content:document.getElementById('teContent').value}).then(function(r){

    else showToast(r.msg||'提交失败','error')

// ========== Permission ==========
var permissionMenus={dashboard:'首页仪表盘',project:'项目管理',task:'任务管理',timeEntry:'工时管理',approval:'工时审批',statisticsEmp:'员工工时统计',statisticsProj:'项目工时统计',userMgmt:'用户管理',roleMgmt:'角色管理'};
var permissionActions={view:'查看',create:'新建',edit:'编辑','delete':'删除',approve:'审批通过',reject:'审批驳回',export:'导出Excel',assign:'分配权限'};

function showPermissionModal(name,code){
  apiGet('/api/roles/permissions?code='+code).then(function(perms){
    var html='';
    for(var key in permissionMenus){
      var p=(perms||[]).find(function(x){return x.menuKey===key});
      var acts=p?p.actions.split(','):[];
      html+='<div class="perm-group"><label class="perm-menu-label"><input type="checkbox" class="perm-menu-cb" data-key="'+key+'" onchange="togglePermMenu(this)"'+(acts.length?' checked':'')+'>'+permissionMenus[key]+'</label><div class="perm-children">';
      var actionKeys={dashboard:['view'],project:['view','create','edit','delete'],task:['view','create','edit','delete'],timeEntry:['view','create'],approval:['view','approve','reject'],statisticsEmp:['view','export'],statisticsProj:['view','export'],userMgmt:['view','create','edit','delete'],roleMgmt:['view','create','edit','delete','assign']};
      (actionKeys[key]||[]).forEach(function(ak){
        var checked=acts.indexOf(ak)>=0||acts.indexOf(permissionActions[ak])>=0;
        html+='<label class="perm-child-label"><input type="checkbox" class="perm-child-cb" data-key="'+key+'" data-action="'+(permissionActions[ak]||ak)+'" onchange="togglePermChild(this)"'+(checked?' checked':'')+'>'+(permissionActions[ak]||ak)+'</label>';
      });
      html+='</div></div>';
    }
    var o=modal('分配权限 - '+name,html+'<div class="modal-footer"><button class="btn btn-secondary" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-primary" onclick="savePermissions(\''+code+'\')">保存</button></div>');
  })
}
function togglePermMenu(cb){
  var key=cb.getAttribute('data-key'),chk=cb.checked;
  document.querySelectorAll('.perm-child-cb[data-key="'+key+'"]').forEach(function(el){el.checked=chk});
}
function togglePermChild(cb){
  var key=cb.getAttribute('data-key');
  var all=document.querySelectorAll('.perm-child-cb[data-key="'+key+'"]'),chked=document.querySelectorAll('.perm-child-cb[data-key="'+key+'"]:checked');
  var menuCb=document.querySelector('.perm-menu-cb[data-key="'+key+'"]');
  if(menuCb)menuCb.checked=chked.length>0;
}
function savePermissions(code){
  var perms=[];
  document.querySelectorAll('.perm-child-cb:checked').forEach(function(cb){
    var key=cb.getAttribute('data-key'),act=cb.getAttribute('data-action');
    var existing=perms.find(function(p){return p.menuKey===key});
    if(existing)existing.actions+=','+act;
    else perms.push({menuKey:key,actions:act});
  });
  // Find role id from cache
  var rid=null;(dataCache.roleMgmt||[]).forEach(function(r){if(r.code===code)rid=r.id});
  if(!rid){showToast('未找到角色','error');return}
  apiPost('/api/roles/'+rid+'/permissions',{permissions:perms}).then(function(r){
    if(r.code===200){showToast('权限分配成功','success');document.querySelector('.modal-overlay').remove()}else showToast(r.msg||'操作失败','error')
  })
}
