// ========== API 接口层 ==========
const api = {
  get: function(url){return fetch(url,{credentials:'include'}).then(function(r){return r.json()}).then(function(d){return d.code===200?d.data:null})},
  post: function(url, body){return fetch(url,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()})},
  put: function(url, body){return fetch(url,{method:'PUT',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()})},
  del: function(url){return fetch(url,{method:'DELETE',credentials:'include'}).then(function(r){return r.json()})}
};

// ========== 数据缓存 ==========
const dataCache = {};
const apiRoutes = {
  dashboard: '/api/dashboard',
  project: '/api/projects',
  task: '/api/tasks',
  timeEntry: '/api/time-entries',
  approval: '/api/approvals',
  statisticsEmp: '/api/statistics/employees',
  statisticsProj: '/api/statistics/projects',
  userMgmt: '/api/users',
  roleMgmt: '/api/roles'
};

function loadRouteData(route) {
  var url = apiRoutes[route];
  if (!url) return Promise.resolve();
  return api.get(url).then(function(data){
    if (data) {
      var arr = Array.isArray(data) ? data : (data.list || []);
      dataCache[route] = arr;
    }
  }).catch(function(){});
}

function loadAllData() {
  return Promise.all([
    loadRouteData('project'),
    loadRouteData('task'),
    loadRouteData('timeEntry'),
    loadRouteData('approval'),
    loadRouteData('statisticsEmp'),
    loadRouteData('statisticsProj'),
    loadRouteData('userMgmt'),
    loadRouteData('roleMgmt')
  ]);
}

function renderPermissionCheckboxes(roleCode) {
  const curPerms = rolePermissions[roleCode] || {};
  let html = '';
  permissionTree.forEach(g => {
    const menuPerms = curPerms[g.key] || [];
    const allChecked = g.perms.every(p => menuPerms.includes(p));
    const someChecked = g.perms.some(p => menuPerms.includes(p));
    html += `<div class="perm-group">`;
    html += `<label class="perm-menu-label"><input type="checkbox" class="perm-menu-cb" data-key="${g.key}" ${allChecked ? 'checked' : ''} ${!allChecked && someChecked ? 'data-indeter="1"' : ''} onchange="var cbs=this.closest('.perm-group').querySelectorAll('.perm-child-cb');cbs.forEach(function(cb){cb.checked=this.checked}.bind(this))"> ${g.menu}</label>`;
    html += `<div class="perm-children">`;
    g.perms.forEach(p => {
      const checked = menuPerms.includes(p);
      html += `<label class="perm-child-label"><input type="checkbox" class="perm-child-cb" data-menu="${g.key}" ${checked ? 'checked' : ''} onchange="var parent=this.closest('.perm-group').querySelector('.perm-menu-cb');var sibs=this.closest('.perm-children').querySelectorAll('.perm-child-cb');var all=Array.from(sibs).every(function(c){return c.checked});var none=Array.from(sibs).every(function(c){return !c.checked});parent.checked=all;parent.indeterminate=!all&&!none"> ${p}</label>`;
    });
    html += `</div></div>`;
  });
  // Set indeterminate states after render
  setTimeout(function(){document.querySelectorAll('.perm-menu-cb[data-indeter]').forEach(function(cb){cb.indeterminate=true;cb.removeAttribute('data-indeter')})},0);
  return html;
}

function navigate(route) {
  currentRoute = route;
  renderSidebar(route);
  const renderFn = pageRenderers[route];
  if (renderFn) {
    document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:40px;color:#7a7a7a">加载中...</div>';
    loadRouteData(route).then(function(){
      document.getElementById('mainContent').innerHTML = renderFn();
    });
  }
}

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
  overlay.innerHTML = `
    <div class="modal" style="width:500px">
      <div class="modal-title">编辑角色</div>
      <div class="form-group">
        <label class="form-label">角色名称 <span style="color:#ff453a">*</span></label>
        <input type="text" class="form-input" value="${name}">
      </div>
      <div class="form-group">
        <label class="form-label">角色编码</label>
        <input type="text" class="form-input" value="${code}" readonly style="background:#f5f5f7;color:#7a7a7a">
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-input" rows="3">${note}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-input form-select">
          <option${status === '启用' ? ' selected' : ''}>启用</option>
          <option${status === '停用' ? ' selected' : ''}>停用</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="showToast('角色更新成功','success');this.closest('.modal-overlay').remove()">保存</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function showPermissionModal(roleName, roleCode) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
  overlay.innerHTML = `
    <div class="modal" style="width:540px">
      <div class="modal-title">分配权限 — ${roleName}</div>
      <div style="max-height:420px;overflow-y:auto;padding:4px 0">
        ${renderPermissionCheckboxes(roleCode)}
      </div>
      <div class="modal-footer" style="border-top:1px solid var(--color-divider);padding-top:16px;margin-top:8px">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="savePermissions('${roleCode}');showToast('权限分配成功','success');this.closest('.modal-overlay').remove()">保存</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function savePermissions(roleCode) {
  const newPerms = {};
  document.querySelectorAll('.perm-group').forEach(group => {
    const menuCb = group.querySelector('.perm-menu-cb');
    const key = menuCb.dataset.key;
    const checkedPerms = [];
    group.querySelectorAll('.perm-child-cb').forEach(cb => {
      if (cb.checked) checkedPerms.push(cb.labels[0].textContent.trim());
    });
    newPerms[key] = checkedPerms;
  });
  rolePermissions[roleCode] = newPerms;
  // 如果是当前用户角色变了，刷新侧边栏
  if (currentRoute === 'roleMgmt') navigate('roleMgmt');
}

function showRejectModal(employeeName) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
  overlay.innerHTML = `
    <div class="modal" style="width:460px">
      <div class="modal-title">驳回工时 — ${employeeName}</div>
      <div class="form-group">
        <label class="form-label">驳回原因 <span style="color:#ff453a">*</span></label>
        <textarea class="form-input" rows="4" placeholder="请输入驳回原因，以便员工了解问题后修改重提"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-danger" onclick="var t=this.closest('.modal-overlay').querySelector('textarea');if(!t.value.trim()){t.focus();return}showToast('已驳回：'+t.value.trim(),'success');this.closest('.modal-overlay').remove()">确定驳回</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function showConfirm(msg, title, action) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">${title || '确认操作'}</div>
      <div class="confirm-text">${msg}</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="showToast('操作成功','success');this.closest('.modal-overlay').remove()">确定</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
}


// ========== 页面初始化 ==========
loadAllData().then(function(){
  checkLogin();
  renderSidebar();
  navigate('dashboard');
});

// ========== 登录检查 ==========
function checkLogin() {
  api.get('/api/auth/check').then(function(user){
    if (user) {
      var navUser = document.querySelector('.navbar-user');
      if (navUser) navUser.textContent = (user.realName || user.name || user.username) + ' ▼';
    }
  }).catch(function(){
    window.location.href = 'login.html';
  });
}
